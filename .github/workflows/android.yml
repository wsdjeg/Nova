name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon
    
    - name: Get version info
      id: version
      run: |
        echo "VERSION_NAME=$(grep -oP 'versionName\s*=?\s*["\x27]\K[^"\x27]+' app/build.gradle | head -1)" >> $GITHUB_OUTPUT
        echo "VERSION_CODE=$(grep -oP 'versionCode\s*=?\s*\K\d+' app/build.gradle | head -1)" >> $GITHUB_OUTPUT
        echo "BUILD_TIME=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
    
    - name: Rename APK
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/ChatApp-${{ steps.version.outputs.BUILD_TIME }}.apk
    
    - name: Create PreRelease
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.VERSION_CODE }}-${{ steps.version.outputs.BUILD_TIME }}
        name: PreRelease v${{ steps.version.outputs.VERSION_NAME }} (${{ steps.version.outputs.BUILD_TIME }})
        body: |
          ## 自动构建 PreRelease
          
          **版本**: ${{ steps.version.outputs.VERSION_NAME }}
          **构建时间**: ${{ steps.version.outputs.BUILD_TIME }}
          **Commit**: ${{ github.sha }}
          
          ### 下载说明
          下载 APK 文件安装即可使用
        draft: false
        prerelease: true
        files: app/build/outputs/apk/debug/ChatApp-${{ steps.version.outputs.BUILD_TIME }}.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
