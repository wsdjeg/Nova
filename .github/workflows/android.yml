name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Download Gradle Wrapper JAR
      run: |
        mkdir -p gradle/wrapper
        GRADLE_VERSION="8.0"
        wget -q https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip
        unzip -q gradle-${GRADLE_VERSION}-bin.zip
        find gradle-${GRADLE_VERSION} -name "gradle-wrapper*.jar" -exec cp {} gradle/wrapper/gradle-wrapper.jar \;
        rm -rf gradle-${GRADLE_VERSION} gradle-${GRADLE_VERSION}-bin.zip

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug
    
    - name: Get version info
      id: version
      run: |
        echo "VERSION_NAME=$(grep -oP 'versionName\s*=?\s*["\x27]\K[^"\x27]+' app/build.gradle | head -1)" >> $GITHUB_OUTPUT
        echo "VERSION_CODE=$(grep -oP 'versionCode\s*=?\s*\K\d+' app/build.gradle | head -1)" >> $GITHUB_OUTPUT
        echo "BUILD_TIME=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
    
    - name: Rename APK
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/ChatApp-${{ steps.version.outputs.BUILD_TIME }}.apk
    
    - name: Create PreRelease
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.VERSION_CODE }}-${{ steps.version.outputs.BUILD_TIME }}
        name: PreRelease v${{ steps.version.outputs.VERSION_NAME }} (${{ steps.version.outputs.BUILD_TIME }})
        body: |
          ## 自动构建 PreRelease
          
          **版本**: ${{ steps.version.outputs.VERSION_NAME }}
          **构建时间**: ${{ steps.version.outputs.BUILD_TIME }}
          **Commit**: ${{ github.sha }}
          
          ### 下载说明
          下载 APK 文件安装即可使用
        draft: false
        prerelease: true
        files: app/build/outputs/apk/debug/ChatApp-${{ steps.version.outputs.BUILD_TIME }}.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
