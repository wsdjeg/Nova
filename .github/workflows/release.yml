name: Build & Release

on:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.VERSION_NAME }}
      version_code: ${{ steps.version.outputs.VERSION_CODE }}
      build_time: ${{ steps.version.outputs.BUILD_TIME }}
      short_sha: ${{ steps.version.outputs.SHORT_SHA }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.0"

      # ── Vosk 语音模型 ──────────────────────────────────────────────
      # 模型不纳入仓库，在 CI 构建时动态下载到 assets 目录
      # 代码中期望路径: assets/vosk-model-small-cn/
      # 官方下载: https://alphacephei.com/vosk/models
      - name: Cache Vosk model
        id: cache-vosk-model
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/vosk-model-small-cn
          key: vosk-model-small-cn-0.22

      - name: Download Vosk Chinese small model
        if: steps.cache-vosk-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p app/src/main/assets
          cd /tmp
          curl -fSL -o vosk-model-small-cn-0.22.zip \
            https://alphacephei.com/vosk/models/vosk-model-small-cn-0.22.zip
          unzip -q vosk-model-small-cn-0.22.zip
          mv vosk-model-small-cn-0.22 "${{ github.workspace }}/app/src/main/assets/vosk-model-small-cn"
          rm -f vosk-model-small-cn-0.22.zip
          echo "✅ Vosk model downloaded to assets/vosk-model-small-cn/"
          ls -lh "${{ github.workspace }}/app/src/main/assets/vosk-model-small-cn/"

      # ── Debug Keystore ────────────────────────────────────────────
      # 使用 GitHub Actions Cache 持久化 keystore，确保每次构建签名一致
      # debug keystore 密码公开 (android/android)，不存在安全风险
      - name: Cache debug keystore
        id: cache-keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: debug-keystore-v1

      - name: Generate debug keystore
        if: steps.cache-keystore.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "🆕 Generated new debug keystore"

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Get version info
        id: version
        env:
          SHA: ${{ github.sha }}
        run: |
          VERSION_NAME=$(grep "versionName" app/build.gradle | head -1 | sed 's/.*versionName[[:space:]]*["'"'"']\([^"'"'"']*\).*/\1/')
          VERSION_CODE=$(grep "versionCode" app/build.gradle | head -1 | sed 's/.*versionCode[[:space:]]*\([0-9]*\).*/\1/')
          BUILD_TIME=$(date +'%Y%m%d_%H%M%S')
          SHORT_SHA=$(echo $SHA | cut -c1-7)
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

  pr-check:
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: PR Build OK
        run: echo "PR build completed successfully"

  prerelease:
    needs: build
    if: "github.event_name == 'push' && github.ref == 'refs/heads/master' && !contains(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: nova-apk
          path: ./apk

      - name: Rename APK for prerelease
        env:
          VERSION_NAME: ${{ needs.build.outputs.version_name }}
          SHORT_SHA: ${{ needs.build.outputs.short_sha }}
        run: mv ./apk/app-debug.apk ./apk/Nova-v${VERSION_NAME}-${SHORT_SHA}.apk

      - name: Delete old prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete prerelease --yes --cleanup-tag 2>/dev/null || true

      - name: Create PreRelease
        uses: softprops/action-gh-release@v1
        with:
          tag_name: prerelease
          name: PreRelease v${{ needs.build.outputs.version_name }}
          body: |
            **版本**: ${{ needs.build.outputs.version_name }}
            **构建**: ${{ needs.build.outputs.short_sha }}
            **时间**: ${{ needs.build.outputs.build_time }}

            ${{ github.event.head_commit.message }}

            > 开发版，可能包含未完成功能
          prerelease: true
          files: ./apk/Nova-v${{ needs.build.outputs.version_name }}-${{ needs.build.outputs.short_sha }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: nova-apk
          path: ./apk

      - name: Rename APK for release
        env:
          VERSION_NAME: ${{ needs.build.outputs.version_name }}
        run: mv ./apk/app-debug.apk ./apk/Nova-v${VERSION_NAME}.apk

      - name: Read CHANGELOG
        id: changelog
        run: |
          # Extract changelog for current version
          VERSION="${{ needs.build.outputs.version_name }}"
          # Read CHANGELOG.md and extract version section
          CHANGELOG=$(sed -n "/## \[v${VERSION}\]/,/## \[/p" CHANGELOG.md | head -n -1)
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Delete old release if exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete v${{ needs.build.outputs.version_name }} --yes --cleanup-tag 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.build.outputs.version_name }}
          name: Release v${{ needs.build.outputs.version_name }}
          body: |
            **版本**: ${{ needs.build.outputs.version_name }} (Build ${{ needs.build.outputs.version_code }})
            **构建时间**: ${{ needs.build.outputs.build_time }}

            ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: false
          files: ./apk/Nova-v${{ needs.build.outputs.version_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

