name: Build & Release

on:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.VERSION_NAME }}
      version_code: ${{ steps.version.outputs.VERSION_CODE }}
      build_time: ${{ steps.version.outputs.BUILD_TIME }}
      short_sha: ${{ steps.version.outputs.SHORT_SHA }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.0"

      # в”Җв”Җ Vosk иҜӯйҹіжЁЎеһӢ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      # жЁЎеһӢдёҚзәіе…Ҙд»“еә“пјҢеңЁ CI жһ„е»әж—¶еҠЁжҖҒдёӢиҪҪеҲ° assets зӣ®еҪ•
      # д»Јз Ғдёӯжңҹжңӣи·Ҝеҫ„: assets/vosk-model-small-cn/
      # е®ҳж–№дёӢиҪҪ: https://alphacephei.com/vosk/models
      - name: Cache Vosk model
        id: cache-vosk-model
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/vosk-model-small-cn
          key: vosk-model-small-cn-0.22

      - name: Download Vosk Chinese small model
        if: steps.cache-vosk-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p app/src/main/assets
          cd /tmp
          curl -fSL -o vosk-model-small-cn-0.22.zip \
            https://alphacephei.com/vosk/models/vosk-model-small-cn-0.22.zip
          unzip -q vosk-model-small-cn-0.22.zip
          mv vosk-model-small-cn-0.22 "${{ github.workspace }}/app/src/main/assets/vosk-model-small-cn"
          rm -f vosk-model-small-cn-0.22.zip
          echo "вң… Vosk model downloaded to assets/vosk-model-small-cn/"
          ls -lh "${{ github.workspace }}/app/src/main/assets/vosk-model-small-cn/"

      # в”Җв”Җ Debug Keystore в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      # дҪҝз”Ё cache зј“еӯҳиҮӘеҠЁз”ҹжҲҗзҡ„ debug keystoreпјҢдҝқиҜҒжҜҸж¬Ўжһ„е»әзӯҫеҗҚдёҖиҮҙ
      - name: Cache debug keystore
        id: cache-keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore-v1

      - name: Generate debug keystore
        if: steps.cache-keystore.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.android
          keytool -genkeypair \
            -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "вң… Generated new debug keystore"

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Get version info
        id: version
        env:
          SHA: ${{ github.sha }}
        run: |
          VERSION_NAME=$(grep "versionName" app/build.gradle | head -1 | sed 's/.*versionName[[:space:]]*["'"'"']\([^"'"'"']*\).*/\1/')
          VERSION_CODE=$(grep "versionCode" app/build.gradle | head -1 | sed 's/.*versionCode[[:space:]]*\([0-9]*\).*/\1/')
          BUILD_TIME=$(date +'%Y%m%d_%H%M%S')
          SHORT_SHA=$(echo $SHA | cut -c1-7)
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

  pr-check:
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: PR Build OK
        run: echo "PR build completed successfully"

  prerelease:
    needs: build
    if: "github.event_name == 'push' && github.ref == 'refs/heads/master' && !contains(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: nova-apk
          path: ./apk

      - name: Rename APK for prerelease
        env:
          VERSION_NAME: ${{ needs.build.outputs.version_name }}
          SHORT_SHA: ${{ needs.build.outputs.short_sha }}
        run: mv ./apk/app-debug.apk ./apk/Nova-v${VERSION_NAME}-${SHORT_SHA}.apk

      - name: Delete old prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete prerelease --yes --cleanup-tag 2>/dev/null || true

      # в”Җв”Җ Create PreRelease (with retry) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      # дҪҝз”Ё gh CLI + nick-fields/retry жӣҝд»Ј softprops/action-gh-release@v1
      # и§ЈеҶі GitHub asset upload еҒ¶еҸ‘ 502 Bad Gateway й—®йўҳ
      - name: Write prerelease notes
        env:
          VERSION_NAME: ${{ needs.build.outputs.version_name }}
          SHORT_SHA: ${{ needs.build.outputs.short_sha }}
          BUILD_TIME: ${{ needs.build.outputs.build_time }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          {
            echo "**зүҲжң¬**: ${VERSION_NAME}"
            echo "**жһ„е»ә**: ${SHORT_SHA}"
            echo "**ж—¶й—ҙ**: ${BUILD_TIME}"
            echo ""
            echo "${COMMIT_MSG}"
            echo ""
            echo "> ејҖеҸ‘зүҲпјҢеҸҜиғҪеҢ…еҗ«жңӘе®ҢжҲҗеҠҹиғҪ"
          } > ./release_notes.md

      - name: Create PreRelease (retry on 5xx)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          command: |
            gh release create prerelease \
              --prerelease \
              --title "PreRelease v${{ needs.build.outputs.version_name }}" \
              --notes-file ./release_notes.md \
              ./apk/Nova-v${{ needs.build.outputs.version_name }}-${{ needs.build.outputs.short_sha }}.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: nova-apk
          path: ./apk

      - name: Rename APK for release
        env:
          VERSION_NAME: ${{ needs.build.outputs.version_name }}
        run: mv ./apk/app-debug.apk ./apk/Nova-v${VERSION_NAME}.apk

      - name: Read CHANGELOG
        id: changelog
        run: |
          # Extract changelog for current version
          VERSION="${{ needs.build.outputs.version_name }}"
          # Read CHANGELOG.md and extract version section
          CHANGELOG=$(sed -n "/## \[v${VERSION}\]/,/## \[/p" CHANGELOG.md | head -n -1)
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Delete old release if exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete v${{ needs.build.outputs.version_name }} --yes --cleanup-tag 2>/dev/null || true

      # в”Җв”Җ Create Release (with retry) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      # дҪҝз”Ё gh CLI + nick-fields/retry жӣҝд»Ј softprops/action-gh-release@v1
      # и§ЈеҶі GitHub asset upload еҒ¶еҸ‘ 502 Bad Gateway й—®йўҳ
      - name: Write release notes
        env:
          VERSION_NAME: ${{ needs.build.outputs.version_name }}
          VERSION_CODE: ${{ needs.build.outputs.version_code }}
          BUILD_TIME: ${{ needs.build.outputs.build_time }}
          CHANGELOG: ${{ steps.changelog.outputs.CHANGELOG }}
        run: |
          {
            echo "**зүҲжң¬**: ${VERSION_NAME} (Build ${VERSION_CODE})"
            echo "**жһ„е»әж—¶й—ҙ**: ${BUILD_TIME}"
            echo ""
            echo "${CHANGELOG}"
          } > ./release_notes.md

      - name: Create Release (retry on 5xx)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          command: |
            gh release create v${{ needs.build.outputs.version_name }} \
              --title "Release v${{ needs.build.outputs.version_name }}" \
              --notes-file ./release_notes.md \
              ./apk/Nova-v${{ needs.build.outputs.version_name }}.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

