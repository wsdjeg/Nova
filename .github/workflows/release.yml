name: Build & Release

on:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # 正式发版（chore: release 提交）和 tag 推送不被取消
  cancel-in-progress: ${{ !(startsWith(github.ref, 'refs/tags/') || contains(github.event.head_commit.message, 'chore: release')) }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.VERSION_NAME }}
      version_code: ${{ steps.version.outputs.VERSION_CODE }}
      build_time: ${{ steps.version.outputs.BUILD_TIME }}
      short_sha: ${{ steps.version.outputs.SHORT_SHA }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.0"

      # ── Vosk 语音模型 ──────────────────────────────────────────────
      # 模型不纳入仓库，在 CI 构建时动态下载到 assets 目录
      # 代码中期望路径: assets/vosk-model-small-cn/
      # 官方下载: https://alphacephei.com/vosk/models
      - name: Cache Vosk model
        id: cache-vosk-model
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/vosk-model-small-cn
          key: vosk-model-small-cn-0.22

      - name: Download Vosk Chinese small model
        if: steps.cache-vosk-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p app/src/main/assets
          cd /tmp
          curl -fSL -o vosk-model-small-cn-0.22.zip \
            https://alphacephei.com/vosk/models/vosk-model-small-cn-0.22.zip
          unzip -q vosk-model-small-cn-0.22.zip
          mv vosk-model-small-cn-0.22 "${{ github.workspace }}/app/src/main/assets/vosk-model-small-cn"
          rm -f vosk-model-small-cn-0.22.zip
          echo "✅ Vosk model downloaded to assets/vosk-model-small-cn/"
          ls -lh "${{ github.workspace }}/app/src/main/assets/vosk-model-small-cn/"

      # ── Debug Keystore ────────────────────────────────────────────
      # 使用 cache 缓存自动生成的 debug keystore，保证每次构建签名一致
      - name: Cache debug keystore
        id: cache-keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore-v1

      - name: Generate debug keystore
        if: steps.cache-keystore.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.android
          keytool -genkeypair \
            -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "✅ Generated new debug keystore"

      # ── Debug: 打印 keystore 指纹用于诊断签名不一致问题 ──────────
      - name: Debug keystore info
        run: |
          echo "=== Keystore Cache Hit: ${{ steps.cache-keystore.outputs.cache-hit }} ==="
          echo "HOME=$HOME"
          echo "user.home=$(java -XshowSettings:properties -version 2>&1 | grep 'user.home' || echo 'unknown')"
          echo "=== ~/.android/ directory ==="
          ls -la ~/.android/ 2>/dev/null || echo "~/.android/ does not exist"
          echo "=== Keystore fingerprint (BEFORE build) ==="
          keytool -list -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey 2>/dev/null \
            | grep -iE "SHA1|SHA256|fingerprint|Valid" || echo "Failed to read keystore"

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      # ── Debug: 打印 APK 签名用于诊断 ──────────────────────────────
      - name: Debug APK signature
        run: |
          echo "=== APK signature info ==="
          APKSIGNER=$(find /usr/local/lib/android/sdk/build-tools -name "apksigner" -type f 2>/dev/null | sort -V | tail -1)
          echo "apksigner: $APKSIGNER"
          if [ -n "$APKSIGNER" ]; then
            $APKSIGNER verify --print-certs app/build/outputs/apk/debug/app-debug.apk 2>/dev/null \
              | grep -E "SHA-1|SHA-256" || echo "Failed to verify APK with apksigner"
          else
            echo "apksigner not found, trying keytool"
            # 提取 APK 中的签名证书
            TMPDIR=$(mktemp -d)
            unzip -q app/build/outputs/apk/debug/app-debug.apk "META-INF/*" -d "$TMPDIR" 2>/dev/null
            CERT=$(find "$TMPDIR" -name "*.RSA" -o -name "*.DSA" -o -name "*.EC" | head -1)
            if [ -n "$CERT" ]; then
              keytool -printcert -file "$CERT" 2>/dev/null | grep -iE "SHA1|SHA256|fingerprint"
            else
              echo "No certificate found in APK"
            fi
            rm -rf "$TMPDIR"
          fi

      - name: Get version info
        id: version
        env:
          SHA: ${{ github.sha }}
        run: |
          VERSION_NAME=$(grep "versionName" app/build.gradle | head -1 | sed 's/.*versionName[[:space:]]*["'"'"']\([^"'"'"']*\).*/\1/')
          VERSION_CODE=$(grep "versionCode" app/build.gradle | head -1 | sed 's/.*versionCode[[:space:]]*\([0-9]*\).*/\1/')
          BUILD_TIME=$(date +'%Y%m%d_%H%M%S')
          SHORT_SHA=$(echo $SHA | cut -c1-7)
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

  pr-check:
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: PR Build OK
        run: echo "PR build completed successfully"

  prerelease:
    needs: build
    if: "github.event_name == 'push' && github.ref == 'refs/heads/master' && !contains(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: nova-apk
          path: ./apk

      - name: Rename APK for prerelease
        env:
          VERSION_NAME: ${{ needs.build.outputs.version_name }}
          SHORT_SHA: ${{ needs.build.outputs.short_sha }}
        run: mv ./apk/app-debug.apk ./apk/Nova-v${VERSION_NAME}-${SHORT_SHA}.apk

      - name: Delete old prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete prerelease --yes --cleanup-tag 2>/dev/null || true

      # ── Create PreRelease (with retry) ────────────────────────────
      # 使用 gh CLI + nick-fields/retry 替代 softprops/action-gh-release@v1
      # 解决 GitHub asset upload 偶发 502 Bad Gateway 问题
      - name: Write prerelease notes
        env:
          VERSION_NAME: ${{ needs.build.outputs.version_name }}
          SHORT_SHA: ${{ needs.build.outputs.short_sha }}
          BUILD_TIME: ${{ needs.build.outputs.build_time }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          {
            echo "**版本**: ${VERSION_NAME}"
            echo "**构建**: ${SHORT_SHA}"
            echo "**时间**: ${BUILD_TIME}"
            echo ""
            echo "${COMMIT_MSG}"
            echo ""
            echo "> 开发版，可能包含未完成功能"
          } > ./release_notes.md

      - name: Create PreRelease (retry on 5xx)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          command: |
            gh release create prerelease \
              --prerelease \
              --title "PreRelease v${{ needs.build.outputs.version_name }}" \
              --notes-file ./release_notes.md \
              ./apk/Nova-v${{ needs.build.outputs.version_name }}-${{ needs.build.outputs.short_sha }}.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: build
    # 正式发版两种触发方式：
    # 1. push "chore: release" 到 master（主要方式，action 自动创建 tag）
    # 2. 手动推送 v* tag（兼容方式）
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'push' && github.ref == 'refs/heads/master' && contains(github.event.head_commit.message, 'chore: release'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: nova-apk
          path: ./apk

      - name: Rename APK for release
        env:
          VERSION_NAME: ${{ needs.build.outputs.version_name }}
        run: mv ./apk/app-debug.apk ./apk/Nova-v${VERSION_NAME}.apk

      - name: Read CHANGELOG
        id: changelog
        run: |
          # Extract changelog for current version
          VERSION="${{ needs.build.outputs.version_name }}"
          # Read CHANGELOG.md and extract version section
          CHANGELOG=$(sed -n "/## \[v${VERSION}\]/,/## \[/p" CHANGELOG.md | head -n -1)
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Delete old release if exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete v${{ needs.build.outputs.version_name }} --yes --cleanup-tag 2>/dev/null || true

      # ── Create Release (with retry) ───────────────────────────────
      # gh release create 会自动创建 tag（使用 GITHUB_TOKEN 创建的 tag 不会触发新的 workflow）
      # --target 确保 tag 创建在正确的 commit 上
      - name: Write release notes
        env:
          VERSION_NAME: ${{ needs.build.outputs.version_name }}
          VERSION_CODE: ${{ needs.build.outputs.version_code }}
          BUILD_TIME: ${{ needs.build.outputs.build_time }}
          CHANGELOG: ${{ steps.changelog.outputs.CHANGELOG }}
        run: |
          {
            echo "**版本**: ${VERSION_NAME} (Build ${VERSION_CODE})"
            echo "**构建时间**: ${BUILD_TIME}"
            echo ""
            echo "${CHANGELOG}"
          } > ./release_notes.md

      - name: Create Release (retry on 5xx)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          command: |
            gh release create v${{ needs.build.outputs.version_name }} \
              --target ${{ github.sha }} \
              --title "Release v${{ needs.build.outputs.version_name }}" \
              --notes-file ./release_notes.md \
              ./apk/Nova-v${{ needs.build.outputs.version_name }}.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

